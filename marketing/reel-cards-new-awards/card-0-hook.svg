<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&amp;display=swap');
      .ti{font-family:'Outfit','Helvetica Neue',sans-serif;}
      .bd{font-family:'OutfitText','Helvetica Neue',sans-serif;}
    </style>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="60%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1a1205"/></linearGradient>
    <radialGradient id="ag" cx="80%" cy="30%" r="70%"><stop offset="0%" stop-color="#f59e0b" stop-opacity="0.18"/><stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#glow)"/><rect width="1080" height="1920" fill="url(#ag)"/><text x="1040" y="1180" class="ti" font-size="900" font-weight="800" fill="#f59e0b" opacity="0.08" text-anchor="end">7</text>
  <text x="100" y="300" class="ti" font-size="42" font-weight="800"><tspan fill="#f59e0b">F</tspan><tspan fill="#ffffff">ITZ</tspan><tspan fill="#f59e0b">HR</tspan></text>
  <g opacity="1"><animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.15s" fill="freeze"/><animateTransform attributeName="transform" type="translate" begin="0.15s" dur="0.7s" fill="freeze" calcMode="spline" keySplines="0.16 0.7 0.2 1" keyTimes="0;1" values="0 30;0 0"/><text x="100" y="640" class="ti" font-size="38" font-weight="800" fill="#f59e0b" letter-spacing="6">BIG NEWS</text><text x="100" y="800" class="ti" font-size="128" font-weight="800" fill="#ffffff">We just</text><text x="100" y="936" class="ti" font-size="128" font-weight="800" fill="#f59e0b">got bigger.</text></g>
  <g opacity="1"><animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.45s" fill="freeze"/><animateTransform attributeName="transform" type="translate" begin="0.45s" dur="0.7s" fill="freeze" calcMode="spline" keySplines="0.16 0.7 0.2 1" keyTimes="0;1" values="0 30;0 0"/><text x="100" y="1080" class="bd" font-size="46" fill="rgba(255,255,255,0.72)">Fitz HR now covers 7 modern awards —</text><text x="100" y="1136" class="bd" font-size="46" fill="rgba(255,255,255,0.72)">not just 2.</text></g>
  <g opacity="1"><animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.7s" fill="freeze"/><text x="100" y="1470" class="ti" font-size="38" font-weight="800" fill="rgba(255,255,255,0.85)" letter-spacing="6">SEE THE FULL LIST  →</text></g>
