<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&amp;display=swap');
      .ti{font-family:'Outfit','Helvetica Neue',sans-serif;}
      .bd{font-family:'OutfitText','Helvetica Neue',sans-serif;}
    </style>
  </defs>
  <rect width="1080" height="1920" fill="#f59e0b"/><rect x="100" y="246" width="190" height="78" rx="16" fill="#0f172a"/><text x="124" y="300" class="ti" font-size="42" font-weight="800"><tspan fill="#f59e0b">F</tspan><tspan fill="#ffffff">ITZ</tspan><tspan fill="#f59e0b">HR</tspan></text>
  <g opacity="1"><animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.12s" fill="freeze"/><animateTransform attributeName="transform" type="translate" begin="0.12s" dur="0.7s" fill="freeze" calcMode="spline" keySplines="0.16 0.7 0.2 1" keyTimes="0;1" values="0 30;0 0"/><text x="100" y="780" class="ti" font-size="118" font-weight="800" fill="#0f172a">One platform.</text><text x="100" y="912" class="ti" font-size="118" font-weight="800" fill="#0f172a">Every award.</text></g>
  <g opacity="1"><animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.4s" fill="freeze"/><animateTransform attributeName="transform" type="translate" begin="0.4s" dur="0.7s" fill="freeze" calcMode="spline" keySplines="0.16 0.7 0.2 1" keyTimes="0;1" values="0 30;0 0"/><text x="100" y="1050" class="bd" font-size="44" fill="rgba(15,23,42,0.72)">Hospitality, retail, manufacturing,</text><text x="100" y="1104" class="bd" font-size="44" fill="rgba(15,23,42,0.72)">community care, health &amp; childcare.</text></g>
  <g opacity="1"><animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.7s" fill="freeze"/><animateTransform attributeName="transform" type="scale" begin="0.7s" dur="0.5s" fill="freeze" additive="sum" calcMode="spline" keySplines="0.2 1.3 0.4 1" keyTimes="0;1" values="0.9;1"/><rect x="100" y="1320" width="860" height="140" rx="70" fill="#0f172a"/><text x="530" y="1408" class="ti" font-size="44" font-weight="800" fill="#f59e0b" text-anchor="middle">Find your award  →  fitzhr.com</text></g>
