<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&amp;family=Outfit:wght@600;800&amp;display=swap');
      .pf{font-family:'Playfair Display',Georgia,serif;}
      .of{font-family:'Outfit','Helvetica Neue',sans-serif;}
    </style>
  </defs>
  <rect width="1080" height="1920" fill="#0f172a"/>
  <rect x="48" y="48" width="984" height="1824" rx="56" fill="#141f35" stroke="#f59e0b" stroke-opacity="0.18"/>

  <text x="96" y="160" class="of" font-size="40" font-weight="800">
    <tspan fill="#f59e0b">F</tspan><tspan fill="#ffffff">ITZ</tspan><tspan fill="#f59e0b">HR</tspan>
  </text>

  <g opacity="1">
    <animateTransform attributeName="transform" type="scale" from="0.6" to="1" dur="0.5s" begin="0s" fill="freeze" additive="sum" calcMode="spline" keySplines="0.2 1.4 0.4 1" keyTimes="0;1" values="0.6;1"/>
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0s" fill="freeze"/>
    <rect x="96" y="300" width="172" height="172" rx="36" fill="#f59e0b"/>
    <text x="182" y="438" class="pf" font-size="112" font-weight="900" fill="#0f172a" text-anchor="middle">1</text>
  </g>

  <g opacity="1">
    <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="0.15s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" begin="0.15s" dur="0.7s" fill="freeze" calcMode="spline" keySplines="0.2 0.7 0.2 1" keyTimes="0;1" values="0 30;0 0"/>
    <text x="96" y="860" class="pf" font-size="104" font-weight="900" fill="#ffffff">Starts on your</text>
    <text x="96" y="980" class="pf" font-size="104" font-weight="900" fill="#ffffff">first full pay</text>
    <text x="96" y="1100" class="pf" font-size="104" font-weight="900" fill="#ffffff">period — not</text>
    <text x="96" y="1220" class="pf" font-size="104" font-weight="900" fill="#f59e0b">1 July.</text>
  </g>
</svg>
