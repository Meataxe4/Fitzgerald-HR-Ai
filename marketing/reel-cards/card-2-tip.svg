<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&amp;family=Outfit:wght@600;700;800&amp;display=swap');
      .pf{font-family:'Playfair Display',Georgia,serif;}
      .of{font-family:'Outfit','Helvetica Neue',sans-serif;}
    </style>
  </defs>
  <rect width="1080" height="1920" fill="#0f172a"/><rect x="48" y="48" width="984" height="1824" rx="56" fill="#141f35" stroke="#f59e0b" stroke-opacity="0.18"/>
  <text x="96" y="300" class="of" font-size="42" font-weight="800"><tspan fill="#f59e0b">F</tspan><tspan fill="#ffffff">ITZ</tspan><tspan fill="#f59e0b">HR</tspan></text>
  <text x="984" y="300" class="of" font-size="40" font-weight="800" fill="#f59e0b" text-anchor="end" letter-spacing="2">02</text>
  <g opacity="1"><animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0s" fill="freeze"/><animateTransform attributeName="transform" type="scale" begin="0s" dur="0.55s" fill="freeze" additive="sum" calcMode="spline" keySplines="0.2 1.5 0.4 1" keyTimes="0;1" values="0.5;1"/><rect x="96" y="430" width="160" height="160" rx="32" fill="#f59e0b"/><text x="176" y="546" class="pf" font-size="96" font-weight="900" fill="#0f172a" text-anchor="middle">2</text></g>
  <g opacity="1">
  <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="0.25s" fill="freeze"/>
  <animateTransform attributeName="transform" type="translate" begin="0.25s" dur="0.8s" fill="freeze" calcMode="spline" keySplines="0.16 0.7 0.2 1" keyTimes="0;1" values="0 34;0 0"/>
  <text x="96" y="940" class="pf" font-size="92" font-weight="900" fill="#ffffff">Every level rises</text>
  <text x="96" y="1064" class="pf" font-size="92" font-weight="900" fill="#ffffff">in both awards:</text>
  <text x="96" y="1188" class="pf" font-size="92" font-weight="900" fill="#f59e0b">+4.75%.</text>
  </g>
</svg>
