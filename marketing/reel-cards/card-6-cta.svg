<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&amp;family=Outfit:wght@400;600;700&amp;family=DM+Mono:wght@400;500&amp;display=swap');
      .pf{font-family:'Playfair Display',Georgia,serif;}
      .of{font-family:'Outfit','Helvetica Neue',sans-serif;}
      .dm{font-family:'DM Mono','Courier New',monospace;letter-spacing:0.12em;}
    </style>
  </defs>

  <rect width="1080" height="1920" fill="#f59e0b"/>

  <!-- wordmark on navy chip -->
  <rect x="96" y="120" width="240" height="80" rx="16" fill="#0f172a"/>
  <text x="216" y="174" class="of" font-size="40" font-weight="800" text-anchor="middle">
    <tspan fill="#f59e0b">F</tspan><tspan fill="#ffffff">ITZ</tspan><tspan fill="#f59e0b">HR</tspan>
  </text>

  <text x="96" y="740" class="dm" font-size="30" fill="rgba(15,23,42,0.7)">BEFORE YOUR FIRST JULY PAY RUN</text>

  <!-- headline -->
  <text x="92" y="880" class="pf" font-size="92" font-weight="900" fill="#0f172a">Be ready for</text>
  <text x="92" y="984" class="pf" font-size="92" font-weight="900" fill="#0f172a">the 1 July</text>
  <text x="92" y="1088" class="pf" font-size="92" font-weight="900" fill="#0f172a">pay run.</text>

  <!-- subtext -->
  <text x="96" y="1230" class="of" font-size="42" fill="rgba(15,23,42,0.78)">
    <tspan x="96" dy="0">Fitz HR calculates the exact legal rate for</tspan>
    <tspan x="96" dy="58">every shift, classification and day —</tspan>
    <tspan x="96" dy="58">updated the moment Fair Work publishes</tspan>
    <tspan x="96" dy="58">the determination.</tspan>
  </text>

  <!-- CTA chip -->
  <rect x="96" y="1520" width="888" height="130" rx="65" fill="#0f172a"/>
  <text x="540" y="1602" class="of" font-size="44" font-weight="800" fill="#f59e0b" text-anchor="middle">Check a rate free  →  fitzhr.com</text>

  <!-- disclaimer -->
  <text x="96" y="1812" class="dm" font-size="24" fill="rgba(15,23,42,0.6)">General info only — figures indicative pending the official determination.</text>
</svg>
