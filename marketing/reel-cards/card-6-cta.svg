<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&amp;family=Outfit:wght@600;700;800&amp;display=swap');
      .pf{font-family:'Playfair Display',Georgia,serif;}
      .of{font-family:'Outfit','Helvetica Neue',sans-serif;}
    </style>
  </defs>
  <rect width="1080" height="1920" fill="#f59e0b"/>
  <rect x="96" y="246" width="232" height="78" rx="16" fill="#0f172a"/><text x="212" y="300" class="of" font-size="40" font-weight="800" text-anchor="middle"><tspan fill="#f59e0b">F</tspan><tspan fill="#ffffff">ITZ</tspan><tspan fill="#f59e0b">HR</tspan></text>
  <g opacity="1">
  <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="0.25s" fill="freeze"/>
  <animateTransform attributeName="transform" type="translate" begin="0.25s" dur="0.8s" fill="freeze" calcMode="spline" keySplines="0.16 0.7 0.2 1" keyTimes="0;1" values="0 34;0 0"/>
  <text x="96" y="940" class="pf" font-size="92" font-weight="900" fill="#0f172a">Be ready for</text>
  <text x="96" y="1064" class="pf" font-size="92" font-weight="900" fill="#0f172a">the 1 July</text>
  <text x="96" y="1188" class="pf" font-size="92" font-weight="900" fill="#0f172a">pay run.</text>
  </g>
  <g opacity="1"><animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.75s" fill="freeze"/><animateTransform attributeName="transform" type="scale" begin="0.75s" dur="0.5s" fill="freeze" additive="sum" calcMode="spline" keySplines="0.2 1.3 0.4 1" keyTimes="0;1" values="0.88;1"/><rect x="96" y="1380" width="888" height="140" rx="70" fill="#0f172a"/><text x="540" y="1468" class="of" font-size="44" font-weight="800" fill="#f59e0b" text-anchor="middle">Check a rate free  →  fitzhr.com</text></g>
</svg>
