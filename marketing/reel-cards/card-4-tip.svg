<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&amp;family=Outfit:wght@400;600;700&amp;family=DM+Mono:wght@400;500&amp;display=swap');
      .pf{font-family:'Playfair Display',Georgia,serif;}
      .of{font-family:'Outfit','Helvetica Neue',sans-serif;}
      .dm{font-family:'DM Mono','Courier New',monospace;letter-spacing:0.12em;}
    </style>
  </defs>

  <rect width="1080" height="1920" fill="#0f172a"/>
  <rect x="48" y="48" width="984" height="1824" rx="56" fill="#141f35" stroke="#f59e0b" stroke-opacity="0.18"/>

  <text x="96" y="160" class="of" font-size="40" font-weight="800">
    <tspan fill="#f59e0b">F</tspan><tspan fill="#ffffff">ITZ</tspan><tspan fill="#f59e0b">HR</tspan>
  </text>

  <rect x="96" y="300" width="150" height="150" rx="32" fill="#f59e0b"/>
  <text x="171" y="425" class="pf" font-size="96" font-weight="900" fill="#0f172a" text-anchor="middle">4</text>
  <text x="282" y="368" class="dm" font-size="30" fill="#f59e0b">TIP 4 / 5</text>
  <text x="282" y="416" class="dm" font-size="26" fill="rgba(255,255,255,0.6)">2026 AWARD WAGE INCREASE</text>

  <text x="96" y="640" class="pf" font-size="74" font-weight="900" fill="#ffffff">Re-test your</text>
  <text x="96" y="724" class="pf" font-size="74" font-weight="900" fill="#ffffff">flat &amp; annualised</text>
  <text x="96" y="808" class="pf" font-size="74" font-weight="900" fill="#f59e0b">rates.</text>

  <text x="96" y="940" class="of" font-size="40" fill="rgba(255,255,255,0.72)">
    <tspan x="96" dy="0">A flat or annualised salary that complied</tspan>
    <tspan x="96" dy="60">last year may now sit below the Award.</tspan>
    <tspan x="96" dy="60">The $26.44 floor can push the lowest</tspan>
    <tspan x="96" dy="60">classifications up more than 4.75% — don't</tspan>
    <tspan x="96" dy="60">just multiply. Recompute junior &amp;</tspan>
    <tspan x="96" dy="60">apprentice dollars too.</tspan>
  </text>

  <rect x="96" y="1500" width="888" height="150" rx="24" fill="rgba(239,68,68,0.10)" stroke="#ef4444" stroke-opacity="0.5"/>
  <text x="140" y="1568" class="dm" font-size="26" fill="#ef4444">WATCH OUT</text>
  <text x="140" y="1618" class="of" font-size="38" font-weight="700" fill="#ffffff">Don't assume a flat 4.75% on the lowest rates</text>

  <text x="96" y="1812" class="dm" font-size="28" fill="rgba(255,255,255,0.5)">fitzhr.com</text>
</svg>
