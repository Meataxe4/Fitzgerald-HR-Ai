<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&amp;family=Outfit:wght@400;600;700&amp;family=DM+Mono:wght@400;500&amp;display=swap');
      .pf{font-family:'Playfair Display',Georgia,serif;}
      .of{font-family:'Outfit','Helvetica Neue',sans-serif;}
      .dm{font-family:'DM Mono','Courier New',monospace;letter-spacing:0.14em;}
    </style>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="60%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a1205"/>
    </linearGradient>
    <radialGradient id="amberGlow" cx="50%" cy="100%" r="70%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#glow)"/>
  <rect width="1080" height="1920" fill="url(#amberGlow)"/>

  <!-- wordmark -->
  <text x="96" y="170" class="of" font-size="46" font-weight="800">
    <tspan fill="#f59e0b">F</tspan><tspan fill="#ffffff">ITZ</tspan><tspan fill="#f59e0b">HR</tspan>
  </text>

  <!-- tag -->
  <rect x="96" y="860" width="64" height="4" fill="#f59e0b"/>
  <text x="184" y="872" class="dm" font-size="28" fill="#f59e0b">HOSPITALITY &amp; RESTAURANT AWARD · 2026</text>

  <!-- headline -->
  <text x="92" y="1010" class="pf" font-size="86" font-weight="900" fill="#ffffff">Wages just went</text>
  <text x="92" y="1110" class="pf" font-size="86" font-weight="900" fill="#ffffff">up 4.75%.</text>
  <text x="92" y="1238" class="pf" font-size="86" font-weight="900" fill="#ffffff">Get the 1 July</text>
  <text x="92" y="1338" class="pf" font-size="86" font-weight="900" fill="#ffffff">switch wrong and</text>
  <text x="92" y="1438" class="pf" font-size="86" font-weight="900" fill="#f59e0b">Fair Work finds it.</text>

  <!-- subtitle -->
  <text x="96" y="1560" class="dm" font-size="34" fill="#ffffff">5 MUST-KNOW TIPS  →</text>

  <!-- footer -->
  <text x="96" y="1820" class="dm" font-size="30" fill="rgba(255,255,255,0.55)">fitzhr.com</text>
</svg>
