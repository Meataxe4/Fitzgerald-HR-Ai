<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&amp;family=Outfit:wght@600;800&amp;display=swap');
      .pf{font-family:'Playfair Display',Georgia,serif;}
      .of{font-family:'Outfit','Helvetica Neue',sans-serif;}
    </style>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="62%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a1205"/>
    </linearGradient>
    <radialGradient id="amberGlow" cx="50%" cy="100%" r="75%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#glow)"/>
  <rect width="1080" height="1920" fill="url(#amberGlow)"/>

  <text x="96" y="170" class="of" font-size="46" font-weight="800">
    <tspan fill="#f59e0b">F</tspan><tspan fill="#ffffff">ITZ</tspan><tspan fill="#f59e0b">HR</tspan>
  </text>

  <g opacity="1" transform="translate(0,0)">
    <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="0s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0 28" to="0 0" dur="0.7s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.2 0.7 0.2 1" keyTimes="0;1" values="0 28;0 0"/>
    <text x="92" y="900" class="pf" font-size="118" font-weight="900" fill="#ffffff">Wages went</text>
    <text x="92" y="1020" class="pf" font-size="118" font-weight="900" fill="#ffffff">up 4.75%.</text>
    <text x="92" y="1190" class="pf" font-size="118" font-weight="900" fill="#f59e0b">Don't slip</text>
    <text x="92" y="1310" class="pf" font-size="118" font-weight="900" fill="#f59e0b">on 1 July.</text>
  </g>

  <text x="96" y="1560" class="of" font-size="38" font-weight="800" fill="rgba(255,255,255,0.85)" letter-spacing="6">5 MUST-KNOW TIPS  →</text>
</svg>
