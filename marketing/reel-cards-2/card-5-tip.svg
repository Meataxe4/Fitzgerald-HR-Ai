    </style>
  </defs>
  <rect width="1080" height="1920" fill="#0f172a"/><text x="1030" y="1240" class="ti" font-size="820" font-weight="800" fill="#f59e0b" opacity="0.07" text-anchor="end">5</text><rect x="64" y="300" width="10" height="1300" rx="5" fill="#f59e0b" opacity="0.9"/>
  <text x="110" y="300" class="ti" font-size="42" font-weight="800"><tspan fill="#f59e0b">F</tspan><tspan fill="#ffffff">ITZ</tspan><tspan fill="#f59e0b">HR</tspan></text><text x="980" y="300" class="ti" font-size="40" font-weight="800" fill="#f59e0b" text-anchor="end" letter-spacing="2">05 / 05</text>
