    <style>
        :root{
            --bg:#0b1220; --bg2:#0f172a; --surface:#16213a;
            --border:#2b3a55; --border-soft:#22304c;
            --amber:#f59e0b; --amber-hot:#fbbf24; --amber-soft:rgba(245,158,11,.14); --amber-line:rgba(245,158,11,.45);
            --text:#e6edf7; --muted:#93a3bc; --faint:#66779a;
            --sans:'Outfit',"Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
            --fitz:url("/assets/fitz-bot.webp");
        }
        *,*::before,*::after{box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.6;margin:0;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
        nav{background:rgba(11,18,32,.9);border-bottom:1px solid var(--border-soft)}
        .nav-in{max-width:1060px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:66px}
        .logo{font-weight:800;font-size:1.2rem;letter-spacing:-.01em;color:var(--text);text-decoration:none}
        .logo em{font-style:normal;color:var(--amber)}
        .btn{display:inline-flex;align-items:center;gap:.5rem;background:var(--amber);color:#171003;font-weight:800;border-radius:10px;padding:11px 20px;font-size:.9rem;text-decoration:none;transition:transform .18s ease,box-shadow .18s ease}
        .btn:hover,.btn:focus-visible{transform:translateY(-2px);box-shadow:0 10px 34px rgba(245,158,11,.45)}
        .btn.ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
        .btn.ghost:hover{color:var(--text);border-color:var(--amber-line);box-shadow:none}
        a:focus-visible{outline:2px solid var(--amber);outline-offset:3px}
        main{flex:1;display:flex;align-items:center;justify-content:center;padding:64px 24px;position:relative;overflow:hidden}
        main::before{content:"";position:absolute;inset:0;background:
            radial-gradient(circle at 1px 1px, rgba(147,163,188,.09) 1px, transparent 0),
            radial-gradient(700px 420px at 70% 0%, rgba(245,158,11,.12), transparent 62%);
            background-size:26px 26px,auto;pointer-events:none}
        .card{position:relative;background:var(--surface);border:1px solid var(--amber-line);border-radius:18px;padding:52px 40px;max-width:520px;width:100%;text-align:center;box-shadow:0 40px 90px rgba(0,0,0,.55)}
        .fitz-bot{width:130px;height:107px;background:var(--fitz) center/contain no-repeat;display:inline-block;filter:drop-shadow(0 0 18px rgba(245,158,11,.5));animation:fitzFloat 3.4s ease-in-out infinite;margin-bottom:8px}
        @keyframes fitzFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
        .eyebrow{display:inline-flex;align-items:center;gap:.6rem;font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--amber)}
        .eyebrow::before,.eyebrow::after{content:"";width:26px;height:2px;background:var(--amber)}
        h1{font-size:clamp(1.7rem,4.5vw,2.3rem);font-weight:800;letter-spacing:-.02em;line-height:1.15;margin:14px 0 14px}
        p{color:var(--muted);font-size:.98rem;max-width:40ch;margin:0 auto 30px}
        p a{color:var(--amber-hot)}
        .ctas{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
        footer{border-top:1px solid var(--border-soft);padding:28px 24px;color:var(--faint);font-size:.8rem;text-align:center}
        @media (prefers-reduced-motion:reduce){.fitz-bot{animation:none}.btn{transition:none}}
    </style>
</head>
<body>
    <nav>
        <div class="nav-in">
            <a class="logo" href="/"><em>F</em>ITZ<em>HR</em></a>
            <a class="btn" href="/app">Start Free</a>
        </div>
    </nav>
    <main>
        <div class="card">
            <span class="fitz-bot" role="img" aria-label="Fitz, the award-aware HR robot"></span>
            <div><span class="eyebrow">Under construction</span></div>
            <h1>Partnerships are coming soon.</h1>
            <p>Fitz is building something for partners — watch this space. Want to talk sooner? Reach us at <a href="mailto:support@fitzhr.com">support@fitzhr.com</a>.</p>
            <div class="ctas">
                <a class="btn" href="/">Back to home</a>
                <a class="btn ghost" href="mailto:support@fitzhr.com">Register interest</a>
            </div>
        </div>
    </main>
    <footer>© 2026 Fitz HR Pty Ltd (ABN 87 693 882 709) · Fair Work Act 2009 · Built in Australia</footer>
