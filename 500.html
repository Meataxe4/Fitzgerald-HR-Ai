<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just a moment — Fitz HR</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <style>
        :root {
            --navy:  #0f172a;
            --navy2: #141f35;
            --amber: #f59e0b;
            --amb2:  #fbbf24;
            --rule:  rgba(245,158,11,0.18);
            --w60:   rgba(255,255,255,0.6);
            --w30:   rgba(255,255,255,0.3);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            background: var(--navy);
            color: #fff;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            line-height: 1.5;
        }
        .card {
            max-width: 480px;
            width: 100%;
            background: var(--navy2);
            border: 1px solid var(--rule);
            padding: 2.5rem 2rem;
            text-align: center;
        }
        .badge {
            display: inline-block;
            font-size: 0.72rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--amber);
            border: 1px solid var(--rule);
            padding: 0.35rem 0.75rem;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 0.75rem;
            letter-spacing: -0.01em;
        }
        p {
            color: var(--w60);
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }
        .btn {
            display: inline-block;
            background: var(--amber);
            color: var(--navy);
            font-weight: 800;
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.95rem 2rem;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }
        .btn:hover, .btn:focus { background: var(--amb2); }
        .urgent {
            margin-top: 1.75rem;
            padding: 1rem;
            background: rgba(245,158,11,0.08);
            border: 1px solid var(--rule);
            font-size: 0.9rem;
            color: #fff;
        }
        .urgent strong { color: var(--amber); display: block; margin-bottom: 0.35rem; font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase; }
        .urgent a { color: var(--amber); text-decoration: none; font-weight: 700; }
        .urgent a:hover { text-decoration: underline; }
        .meta {
            margin-top: 1.25rem;
            font-size: 0.8rem;
            color: var(--w30);
        }
        .meta a { color: var(--w60); text-decoration: none; }
        .meta a:hover { color: var(--amber); }
        .countdown { color: var(--w60); font-size: 0.8rem; margin-top: 0.75rem; }
    </style>
</head>
<body>
    <main class="card" role="main">
        <span class="badge">Service Status</span>
        <h1>Just a moment.</h1>
        <p>Our hosting provider is having a brief hiccup. This usually clears within a couple of minutes.</p>
        <button class="btn" onclick="location.reload()">Try again</button>
        <p class="countdown" id="cd">Retrying automatically in 30s…</p>
        <div class="urgent">
            <strong>Need urgent help?</strong>
            Email our team at <a href="mailto:support@fitzhr.com?subject=Urgent%20support%20request">support@fitzhr.com</a> for immediate assistance.
        </div>
        <div class="meta">
            Live status: <a href="https://www.netlifystatus.com" target="_blank" rel="noopener">netlifystatus.com</a>
        </div>
    </main>
    <script>
        (function () {
            var secs = 30;
            var el = document.getElementById('cd');
            var t = setInterval(function () {
                secs -= 1;
                if (secs <= 0) { clearInterval(t); location.reload(); return; }
                el.textContent = 'Retrying automatically in ' + secs + 's…';
            }, 1000);
        })();
    </script>
</body>
</html>
