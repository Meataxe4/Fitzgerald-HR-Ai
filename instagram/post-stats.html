<!doctype html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<title>Fitz HR · IG Post · Stats (1080×1080)</title>
<link rel="stylesheet" href="_shared.css">
<style>
    .frame { padding: 72px; display: grid; grid-template-rows: auto 1fr auto; gap: 36px; }
    .top { display: flex; justify-content: space-between; align-items: center; }
    .grid-stats { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 24px 64px; align-content: center; }
    .stat-cell { padding: 18px 0; border-top: 1px solid var(--rule); }
    .stat-cell .num { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 132px; line-height: 1; color: #fff; }
    .stat-cell .num em { color: var(--amber); font-style: normal; }
    .stat-cell .lbl { font-family: 'DM Mono', monospace; font-size: 16px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--w60); margin-top: 8px; }
    .footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--rule); padding-top: 22px; }
    .pre-headline { font-family: 'DM Mono', monospace; font-size: 16px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--amber); }
    h1.headline { font-size: 64px; max-width: 720px; }
</style>
</head>
<body>
<div class="ig-frame ig-square">
    <div class="bg-grain"></div>
    <div class="bg-orb bg-orb-amber" style="width:520px;height:520px;top:-180px;right:-180px;"></div>
    <div class="bg-vrule"></div>

    <div class="frame">
        <div class="top">
            <div class="brand-row">
                <span class="fitz-bot"></span>
                <span class="wordmark"><span class="wm-f">F</span><span class="wm-itz">itz</span><span class="wm-hr">HR</span></span>
            </div>
            <span class="tag-pill">By the numbers</span>
        </div>

        <div style="display:flex;flex-direction:column;gap:36px;justify-content:center;">
            <div>
                <div class="pre-headline">Fitz HR for Australian venues</div>
                <h1 class="headline" style="margin-top:14px;">An HR desk that <em>pays for itself</em> — in week one.</h1>
            </div>

            <div class="grid-stats">
                <div class="stat-cell">
                    <div class="num"><em>$12k</em></div>
                    <div class="lbl">Avg. annual savings</div>
                </div>
                <div class="stat-cell">
                    <div class="num"><em>&lt;90s</em></div>
                    <div class="lbl">Response time</div>
                </div>
                <div class="stat-cell">
                    <div class="num"><em>24/7</em></div>
                    <div class="lbl">Always available</div>
                </div>
                <div class="stat-cell">
                    <div class="num"><em>100%</em></div>
                    <div class="lbl">Australian law</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <span class="caption">Free forever · Paid plans from $249/yr</span>
            <span class="url-pill">fitzhr.com</span>
        </div>
    </div>
</div>
</body>
</html>
