<!doctype html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<title>Fitz HR · IG Ad · No-show chef (1080×1080)</title>
<link rel="stylesheet" href="_shared.css">
<style>
    .frame { padding: 72px; display: grid; grid-template-rows: auto 1fr auto; gap: 32px; }
    .top { display: flex; justify-content: space-between; align-items: center; }
    .hero-h1 { font-family:'Playfair Display',serif; font-weight:900; font-size:120px; line-height:0.98; letter-spacing:-0.02em; }
    .hero-h1 em { font-style: italic; color: var(--amber); }
    .hook-big { font-family: 'Playfair Display', serif; font-weight: 700; font-style: italic; color: #fff; font-size: 46px; line-height: 1.25; max-width: 880px; }
    .hook-big .accent { color: var(--amber); border-bottom: 3px solid var(--amber); padding-bottom: 4px; display: inline-block; }
    .stack { display: flex; flex-direction: column; gap: 26px; }
    .ctas { display: flex; align-items: center; gap: 24px; }
    .footer { display: flex; justify-content: space-between; align-items: flex-end; border-top: 1px solid var(--rule); padding-top: 22px; }
    .fitz-watermark { position: absolute; right: -180px; bottom: -180px; width: 720px; height: 720px; background: var(--fitz-img) center/contain no-repeat; opacity: 0.06; filter: brightness(1.4) sepia(0.4) saturate(2); pointer-events: none; }
</style>
</head>
<body>
<div class="ig-frame ig-square">
    <div class="bg-grain"></div>
    <div class="bg-orb bg-orb-amber" style="width:480px;height:480px;top:-140px;right:-120px;"></div>
    <div class="bg-orb bg-orb-blue"  style="width:360px;height:360px;bottom:-120px;left:-120px;"></div>
    <div class="bg-vrule"></div>
    <div class="fitz-watermark"></div>

    <div class="frame">
        <div class="top">
            <div class="brand-row">
                <span class="fitz-bot"></span>
                <span class="wordmark"><span class="wm-f">F</span><span class="wm-itz">itz</span><span class="wm-hr">HR</span></span>
            </div>
            <div class="eyebrow">
                <span class="ep"><span class="ep-dot"></span><span class="ep-ring"></span></span>
                <span class="eyebrow-text">HR &amp; Compliance · Live</span>
            </div>
        </div>

        <div class="stack" style="justify-content:center;">
            <h1 class="hero-h1">The HR desk<br>every venue<br><em>deserves.</em></h1>
            <p class="hook-big">Your <span class="accent">chef</span> is a no-show.<br>Fitz tells you exactly what to do.</p>
        </div>

        <div class="footer">
            <div class="ctas">
                <a class="btn-primary"><span>Start Free</span><span class="arr">→</span></a>
                <span class="caption">No card required</span>
            </div>
            <span class="url-pill">fitzhr.com</span>
        </div>
    </div>
</div>
</body>
</html>
