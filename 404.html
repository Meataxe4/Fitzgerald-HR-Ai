<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page not found — Fitz HR</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <style>
        :root {
            --navy:  #0f172a;
            --navy2: #141f35;
            --amber: #f59e0b;
            --amb2:  #fbbf24;
            --rule:  rgba(245,158,11,0.18);
            --w60:   rgba(255,255,255,0.6);
            --w30:   rgba(255,255,255,0.3);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            background: var(--navy);
            color: #fff;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            line-height: 1.5;
        }
        .card {
            max-width: 480px;
            width: 100%;
            background: var(--navy2);
            border: 1px solid var(--rule);
            padding: 2.5rem 2rem;
            text-align: center;
        }
        .code {
            font-size: 0.72rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--amber);
            margin-bottom: 1.5rem;
            display: inline-block;
            border: 1px solid var(--rule);
            padding: 0.35rem 0.75rem;
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 0.75rem;
            letter-spacing: -0.01em;
        }
        p {
            color: var(--w60);
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }
        .btn {
            display: inline-block;
            background: var(--amber);
            color: var(--navy);
            font-weight: 800;
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.95rem 2rem;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn:hover, .btn:focus { background: var(--amb2); }
        .meta {
            margin-top: 1.75rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--rule);
            font-size: 0.85rem;
            color: var(--w30);
        }
        .meta a { color: var(--amber); text-decoration: none; }
        .meta a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <main class="card" role="main">
        <span class="code">Error 404</span>
        <h1>Page not found.</h1>
        <p>The page you're looking for doesn't exist or has moved.</p>
        <a class="btn" href="/">Back to home</a>
        <div class="meta">
            Looking for something specific? <a href="mailto:support@fitzhr.com">support@fitzhr.com</a>
        </div>
    </main>
</body>
</html>
