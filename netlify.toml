# Netlify Configuration for Fitz HR

[build]
  command = "npm run build"
  publish = "."
  functions = "netlify/functions"

# Canonicalize www -> apex in a single hop (avoids redirect chain)
[[redirects]]
  from = "https://www.fitzhr.com/*"
  to = "https://fitzhr.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.fitzhr.com/*"
  to = "https://fitzhr.com/:splat"
  status = 301
  force = true

# Redirect rules for OAuth callbacks
[[redirects]]
  from = "/auth/deputy/callback"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/auth/xero/callback"
  to = "/index.html"
  status = 200
  force = true

# API proxy for functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/compare/fitz-hr-vs-brighthr"
  to = "/compare/fitz-hr-vs-brighthr.html"
  status = 200  

