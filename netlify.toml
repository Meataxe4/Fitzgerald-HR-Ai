# Netlify Configuration for Fitz HR

[build]
  command = "echo 'No build step required - static site'"
  publish = "."
  functions = "netlify/functions"

# Redirect rules for OAuth callbacks
[[redirects]]
  from = "/auth/deputy/callback"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/auth/xero/callback"
  to = "/index.html"
  status = 200
  force = true

# API proxy for functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/compare/fitz-hr-vs-brighthr"
  to = "/compare/fitz-hr-vs-brighthr.html"
  status = 200  

